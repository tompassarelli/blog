{{ define "main" }}
{{ range .Site.Sections.ByWeight }}
<section class="mb-10">
  <h2 class="text-xl font-semibold text-neutral-300 mb-3 border-b border-neutral-800 pb-1">
    <a href="{{ .RelPermalink }}" class="hover:text-blue-300">{{ .Title }}</a>
  </h2>
  {{ range .Pages.ByWeight }}
  <div class="mb-2">
    <a href="{{ .RelPermalink }}" class="text-blue-400 hover:text-blue-300">{{ .Title }}</a>
    <span class="text-neutral-500 text-sm ml-2">{{ .Date.Format "2006-01-02" }}</span>
  </div>
  {{ end }}
</section>
{{ end }}
{{ end }}
