<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
</head>
<body class="max-w-3xl mx-auto px-4 py-8 bg-neutral-950 text-neutral-200 min-h-screen flex flex-col">
  <header class="flex flex-wrap items-center justify-between gap-2 mb-8">
    <a href="/" class="text-xl font-bold hover:text-blue-300">{{ .Site.Title }}</a>
    <form action="https://buttondown.com/api/emails/tompassarelli" method="post" class="flex gap-2 items-center">
      <input type="email" name="email" placeholder="your@email.com" required
        class="bg-neutral-900 border border-neutral-700 rounded px-3 py-1.5 text-sm text-neutral-200 placeholder-neutral-500 focus:outline-none focus:border-blue-400">
      <button type="submit" class="bg-blue-500 hover:bg-blue-400 text-white px-3 py-1.5 text-sm rounded">subscribe</button>
    </form>
  </header>
  <div class="flex-1">{{ block "main" . }}{{ end }}</div>
</body>
</html>
