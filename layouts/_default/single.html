{{ define "main" }}
<div class="mb-6">
  <a href="/{{ .Section }}/" class="text-sm text-blue-400 hover:text-blue-300">{{ .Section }}</a>
  <h1 class="text-3xl font-bold border-b border-neutral-700 pb-2 mt-2">{{ .Title }}</h1>
  <time class="text-sm text-neutral-500">{{ .Date.Format "2006-01-02" }}</time>
</div>
<article class="prose prose-invert prose-neutral max-w-none">
  {{ .Content }}
</article>
{{ end }}
