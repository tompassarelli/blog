{{ define "main" }}
<div class="mb-8">
  <div class="flex items-center gap-2 text-sm text-neutral-500 mb-1">
    <a href="/{{ .Section }}/" class="text-blue-400 hover:text-blue-300">{{ .Section }}</a>
    <span>&middot;</span>
    <time>{{ .Date.Format "2006-01-02" }}</time>
  </div>
  <h1 class="text-3xl font-bold">{{ .Title }}</h1>
</div>
<article class="prose prose-invert prose-neutral max-w-none prose-hr:border-neutral-800">
  {{ .Content }}
</article>
{{ end }}
